<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长记忆 - 宝贝成长相册</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 - 年龄时间树 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="title">成长记忆</h1>
                <p class="subtitle">宝贝成长时间树</p>
            </div>
            <div class="age-tree" id="timeline">
                <!-- 年龄节点会动态生成 -->
            </div>
            <div class="sidebar-footer">
                <p>💗 每一岁都值得珍藏</p>
            </div>
        </aside>

        <!-- 右侧主内容区 - 照片画廊 -->
        <main class="main-content">
            <div class="content-header">
                <h2 class="current-age-title" id="currentAgeTitle">选择年龄开始</h2>
                <p class="photo-count-info" id="photoCountInfo">还没有照片</p>
            </div>
            
            <div class="gallery-container" id="galleryContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">👶</div>
                    <h3>开始记录成长吧</h3>
                    <p>选择左侧年龄，点击右下角 + 号添加宝贝照片</p>
                </div>
                <div class="photo-grid" id="photoGrid"></div>
            </div>
        </main>

        <!-- 添加照片按钮 -->
        <button class="add-photo-btn" id="addPhotoBtn" style="display: none;">
            <span>+</span>
        </button>

        <!-- 上传模态框 -->
        <div class="modal" id="uploadModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>添加新照片</h2>
                    <button class="modal-close" id="cancelUpload">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">🖼️</div>
                        <p class="upload-title">点击或拖拽图片到此处</p>
                        <p class="upload-hint">支持多张图片同时上传</p>
                        <input type="file" id="fileInput" accept="image/*" multiple hidden>
                    </div>
                    <div class="form-group">
                        <label>照片描述</label>
                        <input type="text" id="photoDesc" placeholder="记录这个美好的瞬间...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="confirmUpload">
                        <span>✓</span> 确认上传
                    </button>
                </div>
            </div>
        </div>

        <!-- 图片查看器模态框 -->
        <div class="viewer-modal" id="viewerModal">
            <div class="viewer-backdrop"></div>
            <div class="viewer-content">
                <button class="viewer-close" id="closeViewer">&times;</button>
                <img class="viewer-image" id="viewerImage" src="" alt="">
                <div class="viewer-info">
                    <p class="viewer-desc" id="viewerDesc"></p>
                    <p class="viewer-date" id="viewerDate"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
